# Classroom pipeline:
#   1) CI  — verify the change (automated tests on the GitHub runner).
#   2) Build — produce a deployable container image (artefact you would ship in CD).
# Full CD (push image to registry, deploy to staging/prod) is intentionally not wired
# here so the demo stays small; explain that step verbally or extend the workflow later.

name: "CI — tests + container build (CD artefact)"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (Node.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run test suite
        run: npm test

  docker:
    name: Build container image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devops-demo:ci .
